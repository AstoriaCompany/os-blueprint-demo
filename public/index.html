<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS Blueprint</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #16213e;
      color: #4ecca3;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.1rem;
      color: #888;
      max-width: 420px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #4ecca3;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .stack {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .tag {
      background: #111;
      border: 1px solid #1e1e1e;
      color: #666;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Live on AWS Elastic Beanstalk</div>
    <h1>OS Blueprint</h1>
    <p>Skeleton app deployed via GitHub Actions. Push to main — it ships.</p>
    <div class="status">
      <div class="dot"></div>
      <span>Deployed &amp; running</span>
    </div>
    <div class="stack">
      <span class="tag">Node.js</span>
      <span class="tag">Express</span>
      <span class="tag">GitHub Actions</span>
      <span class="tag">Elastic Beanstalk</span>
    </div>
  </div>
</body>
</html>
